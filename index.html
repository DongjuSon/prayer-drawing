<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="His Plan - 하나님의 뜻을 따라 세계를 위해 기도하세요">
    <meta name="theme-color" content="#9dc88d">

    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="His Plan - 기도 제비뽑기">
    <meta property="og:description" content="하나님의 뜻을 따라 세계를 위해 기도하세요">
    <meta property="og:type" content="website">

    <title>His Plan - 기도 제비뽑기</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Initial State: Draw Button -->
        <div id="draw-screen" class="screen active" role="main" aria-live="polite">
            <div class="draw-content">

                <!-- Title Image: His Plan + verse text -->
                <div class="title-area">
                    <img src="homepage_title.png" class="title-image" alt="His Plan - 하나님이여 주의 생각이 내게 어찌 그리 보배로우신지요">
                </div>

                <!-- Action Area: CTA text + draw button -->
                <div class="action-area">
                    <img src="homepage_bottom.png" class="bottom-text-image" alt="아래버튼을 눌러 내게 주신 기도제목을 가지고 함께 기도해주세요!">
                    <button id="draw-btn" class="draw-button" aria-label="기도 제비뽑기">
                        <span class="btn-icon" aria-hidden="true">🙏</span>
                    </button>
                </div>

            </div>
        </div>

        <!-- Loading Animation -->
        <div id="loading-screen" class="screen" role="status" aria-live="polite" aria-label="Drawing animation in progress">
            <div class="loading-animation">
                <div class="card-shuffle" aria-hidden="true">
                    <div class="card"></div>
                    <div class="card"></div>
                    <div class="card"></div>
                </div>
                <p class="loading-text">Drawing your prayer topic...</p>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="screen" role="main" aria-live="polite">
            <div class="result-card">
                <div class="card-content">
                    <h2 id="country-name" class="country-name"></h2>
                    <p id="verse-reference" class="verse-reference" role="text"></p>
                    <div class="star-divider">✦</div>
                    <div class="prayer-section">
                        <ul id="prayer-points-list" class="prayer-points-list"></ul>
                    </div>
                    <div class="prayer-icon">🙏</div>
                    <p id="verse-text" class="verse-text" role="text"></p>
                </div>
                <div class="card-footer">
                    <button id="download-btn" class="download-button" aria-label="이미지 저장하기">
                        <span aria-hidden="true">⬇</span> 이미지 저장하기
                    </button>
                </div>
            </div>
        </div>

    </div>

    <footer class="footer">
        <img src="homepage_logo.png" class="brand-logo-img" alt="Spring Ministry">
    </footer>
    <script src="script.js"></script>
</body>
</html>
